<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baggage Verification</title>

<style>
body {
  font-family: system-ui;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
  padding: 16px;
}

.card {
  max-width: 420px;
  margin: auto;
  background: #111827;
  border-radius: 14px;
  padding: 16px;
  border: 1px solid #1f2937;
}

h2 {
  margin: 0 0 8px;
}

.small {
  color: #94a3b8;
  font-size: 13px;
}

.owner {
  color: #94a3b8;
  font-size: 15px;
  font-weight: bold;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2563eb;
  color: white;
}

.result {
  margin-top: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="name"></h2>
  <div class="owner" id="owner"></div>
  <div class="small" id="code"></div>
  <div class="small" id="route"></div>
  <div class="small" id="flight"></div>

  <input type="password" id="pass" placeholder="Enter passphrase" />
  <button onclick="verify()">Verify</button>

  <div id="result" class="result"></div>
</div>

<!-- <script src="app.js"></script> -->
<script src="app.js"></script>
</body>
</html>
